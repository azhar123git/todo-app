<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoLists</title>
    
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    margin-top: 50px;
}

h1 {
    text-align: center;
}

#todo-container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 350px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

input {
    width: 70%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    padding: 8px 12px;
    margin-left: 5px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 15px;
}

li {
    background: #f9f9f9;
    padding: 8px;
    margin-bottom: 8px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

li span {
    flex: 1;
    margin-left: 8px;
}

li button {
    background: #dc3545;
}

li button:hover {
    background: #a71d2a;
}

input[type="checkbox"] {
    transform: scale(1.2);
}
</style>

</head>
<body>
<div id="todo-container">
    <h1>Simple To Do List</h1>

<input type="text" id="todo-input" placeholder="Enter a todo">
<button id="add-btn">Add</button>

<ul id="todo-list"></ul>
</div>

<script src="script.js"></script>



</body>
</html>
